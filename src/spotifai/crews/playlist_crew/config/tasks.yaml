create_playlist_task:
  description: >
    Create a Spotify playlist with the name: {playlist_name}.
    You MUST use the "Create playlist on Spotify" tool exactly once.
    The tool returns a PlaylistResult directly.
  expected_output: >
    The PlaylistResult with status, playlist_id, and playlist_url returned by the tool.
  agent: playlist_manager

add_tracks_task:
  description: >
    You will receive a PlaylistResult from the previous task, which includes the playlist_id and playlist_url.
    Add to the playlist the following tracks: {track_ids}
    You MUST use the "Add tracks to playlist on Spotify" tool exactly once, but only if the previous
    task returned a valid playlist_id. The tool returns a PlaylistResult directly.
    If the previous task returned FAILED or if playlist_id is missing, return status FAILED without calling the tool.
  expected_output: >
    A PlaylistResult with status, playlist_id, playlist_url, and the number of tracks added.
  agent: playlist_manager