create_playlist_task:
  description: >
    Create a Spotify playlist with the name: {playlist_name}.
    Your entire first response must be exactly this tool call, with no Final Answer:

    Thought: I need to create the playlist with Spotify.
    Action: create_playlist_on_spotify
    Action Input: {"name": "{playlist_name}"}

    Do not write status, playlist_id, playlist_url, or JSON yourself.
    The tool result is the answer.
  expected_output: >
    The exact output returned by create_playlist_on_spotify.
  agent: playlist_manager

add_tracks_task:
  description: >
    Add tracks to the existing Spotify playlist with ID: {playlist_id}.
    Add these tracks: {track_ids}
    Your entire first response must be exactly this tool call, with no Final Answer:

    Thought: I need to add the tracks to the Spotify playlist.
    Action: add_tracks_to_playlist_on_spotify
    Action Input: {"playlist_id": "{playlist_id}", "track_ids": "{track_ids}"}

    Do not write status, playlist_id, playlist_url, tracks_added, or JSON yourself.
    The tool result is the answer.
  expected_output: >
    The exact output returned by add_tracks_to_playlist_on_spotify.
  agent: playlist_manager