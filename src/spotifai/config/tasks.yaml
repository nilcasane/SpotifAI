search_tracks_task:
  description: >
    Search for candidate songs on Spotify based on the user request:
    {user_request}

    Find more songs than needed so they can be filtered later.
    Return songs with name, artist, Spotify ID, and a short reason.

    IMPORTANT: When calling the "Search tracks on Spotify" tool, pass a plain
    text search string as the query. Do NOT wrap the query in JSON or add keys like "type". 
    Just pass the search keywords directly as a simple string.
  expected_output: >
    A list of candidate songs with name, artist, Spotify ID, and reason
    for selection.
  agent: music_searcher

technical_analyst_task:
  description: >
    Analyzes the technical characteristics of the songs found by the music_searcher agent.
    Filters out songs that do not meet the user's criteria.
  expected_output: >
    A list of songs that meet the user's criteria.
  agent: technical_analyst

create_playlist_task:
  description: >
    Create a Spotify playlist using the approved songs.

    The playlist must have a clear name, a short description, and contain
    only the songs approved by the technical analyst.
  expected_output: >
    The Spotify playlist URL and a final summary with the songs added.
  agent: playlist_manager
  output_file: outputs/playlist_summary.md
